<style>

      --accent:#5B8DFF; --accent-contrast:#0B1220;
      --ok:#3FCB8C; --ok-bg:#163024;
      --warn:#E5A83D; --warn-bg:#34280F;

  }
  :root[data-theme="dark"]{
    --bg:#10141B; --surface:#1A2029; --surface-alt:#212836;
    --border:#2B3444; --border-strong:#3A4557;
    --text:#E6EAF0; --text-muted:#8FA0B3;
    --accent:#5B8DFF; --accent-contrast:#0B1220;
    --ok:#3FCB8C; --ok-bg:#163024;
    --warn:#E5A83D; --warn-bg:#34280F;
    --danger:#F16C6C; --danger-bg:#341717;
    --extra:#A78BFA; --extra-bg:#251C3B;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
  }
  :root[data-theme="light"]{
    --bg:#EEF1F4; --surface:#FFFFFF; --surface-alt:#F7F9FB;
    --border:#D7DEE5; --border-strong:#C1CBD4;
    --text:#1A2230; --text-muted:#5F6E7D;
    --accent:#2A5FD9; --accent-contrast:#FFFFFF;
    --ok:#1E8E5A; --ok-bg:#E3F5EC;
    --warn:#A6690A; --warn-bg:#FBF0DD;
    --danger:#C43D3D; --danger-bg:#FBE7E7;
    --extra:#7452C7; --extra-bg:#EFE9FA;
    --shadow: 0 1px 2px rgba(20,30,45,.06), 0 8px 24px rgba(20,30,45,.06);
  }

  *{box-sizing:border-box;}
  body{margin:0;}
  html, body{ background:var(--bg); }
  .app{
    font-family:var(--font-body);
    color:var(--text);
    background:var(--bg);
    min-height:100vh;
    padding:20px 20px 48px;
  }
  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; animation:none !important; }
  }

  /* ---------- Header ---------- */
  .topbar{
    max-width:1180px; margin:0 auto 16px;
    display:flex; align-items:baseline; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  .brand h1{
    font-family:var(--font-display);
    font-weight:700; font-size:26px; letter-spacing:.2px;
    margin:0 0 2px; text-wrap:balance;
  }
  .brand p{ margin:0; color:var(--text-muted); font-size:13.5px; }
  .actions{ display:flex; gap:8px; flex-wrap:wrap; }

  button{ font-family:inherit; cursor:pointer; }
  .btn{
    appearance:none; border:1px solid var(--border-strong); background:var(--surface);
    color:var(--text); padding:8px 14px; border-radius:8px; font-size:13.5px; font-weight:600;
    display:inline-flex; align-items:center; gap:6px;
  }
  .btn:hover{ border-color:var(--accent); }
  .btn:focus-visible, input:focus-visible, textarea:focus-visible{
    outline:2px solid var(--accent); outline-offset:2px;
  }
  .btn-primary{ background:var(--accent); border-color:var(--accent); color:var(--accent-contrast); }
  .btn-primary:hover{ filter:brightness(1.05); }
  .btn-ghost{ background:transparent; border-color:transparent; color:var(--text-muted); }
  .btn-ghost:hover{ color:var(--text); border-color:var(--border-strong); }
  .btn-sm{ padding:5px 10px; font-size:12.5px; border-radius:6px; }

  main{ max-width:1180px; margin:0 auto; }

  /* ---------- Stat strip ---------- */
  .stats{
    display:grid; grid-template-columns:repeat(6,1fr); gap:10px; margin-bottom:16px;
  }
  @media (max-width:900px){ .stats{ grid-template-columns:repeat(3,1fr);} }
  @media (max-width:560px){ .stats{ grid-template-columns:repeat(2,1fr);} }
  .stat{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:12px 14px; box-shadow:var(--shadow); cursor:pointer; border-left:3px solid transparent;
  }
  .stat.active{ border-left-color:var(--accent); }
  .stat .n{ font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-size:22px; font-weight:700; line-height:1.1; }
  .stat .l{ color:var(--text-muted); font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; margin-top:2px; }
  .stat.tone-ok .n{ color:var(--ok); }
  .stat.tone-warn .n{ color:var(--warn); }
  .stat.tone-danger .n{ color:var(--danger); }
  .stat.tone-extra .n{ color:var(--extra); }

  /* ---------- Scan dock ---------- */
  .dock{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:16px; margin-bottom:16px;
  }
  .dock label{ font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); font-weight:600; }
  .scan-row{ display:flex; gap:10px; margin-top:6px; }
  .scan-row input[type="text"]{
    flex:1; font-size:17px; padding:11px 14px; border-radius:8px; border:1.5px solid var(--border-strong);
    background:var(--surface-alt); color:var(--text); font-family:var(--font-mono);
  }
  .scan-row input[type="text"]::placeholder{ font-family:var(--font-body); color:var(--text-muted); }

  .suggestions{ margin-top:8px; display:flex; flex-direction:column; gap:4px; }
  .sugg-item{
    display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:7px;
    border:1px solid var(--border); background:var(--surface-alt); text-align:left;
  }
  .sugg-item:hover{ border-color:var(--accent); }
  .sugg-item .code{ font-family:var(--font-mono); font-size:12.5px; color:var(--text-muted); min-width:74px; }
  .sugg-item .name{ flex:1; font-size:13.5px; }
  .sugg-item .mini{ font-size:11.5px; color:var(--text-muted); font-family:var(--font-mono); }

  .confirm{
    margin-top:10px; padding:12px; border-radius:9px; border:1.5px dashed var(--accent);
    background:var(--surface-alt); display:flex; flex-wrap:wrap; align-items:flex-end; gap:14px;
  }
  .confirm .info{ flex:1; min-width:220px; }
  .confirm .info .code{ font-family:var(--font-mono); font-size:12px; color:var(--text-muted); }
  .confirm .info .name{ font-size:15px; font-weight:600; margin:2px 0; text-wrap:balance; }
  .confirm .info .meta{ font-size:12.5px; color:var(--text-muted); font-family:var(--font-mono); font-variant-numeric:tabular-nums; }
  .confirm .qty-block{ display:flex; flex-direction:column; gap:4px; }
  .confirm .qty-block input{
    width:110px; font-size:18px; padding:8px 10px; border-radius:7px; border:1.5px solid var(--border-strong);
    background:var(--surface); color:var(--text); font-family:var(--font-mono); font-variant-numeric:tabular-nums;
  }
  .confirm .btns{ display:flex; gap:8px; }

  .not-found{
    margin-top:10px; padding:12px; border-radius:9px; border:1.5px dashed var(--danger);
    background:var(--surface-alt);
  }
  .not-found .headline{ font-size:13.5px; margin-bottom:8px; color:var(--danger); font-weight:600; }
  .not-found .row{ display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; }
  .not-found .field{ display:flex; flex-direction:column; gap:4px; }
  .not-found .field input{
    padding:7px 9px; border-radius:7px; border:1.5px solid var(--border-strong);
    background:var(--surface); color:var(--text); font-family:var(--font-body); font-size:13.5px;
  }
  .not-found .field.qty input{ width:90px; font-family:var(--font-mono); font-variant-numeric:tabular-nums; }
  .not-found small{ color:var(--text-muted); }

  /* ---------- Filter tabs ---------- */
  .tabs{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .tab{
    border:1px solid var(--border-strong); background:var(--surface); color:var(--text-muted);
    padding:6px 12px; border-radius:999px; font-size:12.5px; font-weight:600;
  }
  .tab.active{ background:var(--accent); border-color:var(--accent); color:var(--accent-contrast); }
  .table-toolbar{ display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
  .table-filter input{
    padding:6px 10px; border-radius:7px; border:1px solid var(--border-strong);
    background:var(--surface); color:var(--text); font-size:12.5px; width:220px;
  }

  /* ---------- Table ---------- */
  .table-wrap{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    box-shadow:var(--shadow); overflow:auto; max-height:56vh;
  }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  thead th{
    position:sticky; top:0; background:var(--surface-alt); text-align:left; z-index:1;
    padding:9px 10px; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted);
    border-bottom:1px solid var(--border); white-space:nowrap;
  }
  tbody td{ padding:8px 10px; border-bottom:1px solid var(--border); vertical-align:middle; }
  tbody tr:hover{ background:var(--surface-alt); }
  td.code{ font-family:var(--font-mono); font-size:12px; color:var(--text-muted); white-space:nowrap; }
  td.produto{ max-width:420px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  td.num{ font-family:var(--font-mono); font-variant-numeric:tabular-nums; text-align:right; white-space:nowrap; }
  td.num input{

    padding:4px 6px; border-radius:6px; border:1px solid var(--border-strong); background:var(--surface); color:var(--text);
  }
  .diff-pos{ color:var(--warn); } .diff-neg{ color:var(--danger); } .diff-zero{ color:var(--text-muted); }

  .pill{
    display:inline-flex; align-items:center; gap:6px; padding:3px 9px; border-radius:999px;
    font-size:11.5px; font-weight:700; white-space:nowrap;
  }
  .pill::before{ content:""; width:6px; height:6px; border-radius:50%; background:currentColor; }
  .pill.ok{ background:var(--ok-bg); color:var(--ok); }
  .pill.warn{ background:var(--warn-bg); color:var(--warn); }
  .pill.danger{ background:var(--danger-bg); color:var(--danger); }
  .pill.extra{ background:var(--extra-bg); color:var(--extra); }

  .empty-row td{ text-align:center; color:var(--text-muted); padding:28px; }

  /* ---------- Import screen ---------- */
  .import-wrap{ max-width:720px; margin:40px auto; }
  .import-card{
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    box-shadow:var(--shadow); padding:28px 30px;

  .import-card p.lead{ color:var(--text-muted); margin:0 0 20px; font-size:14px; max-width:60ch; }
  .import-card textarea{

  .file-drop{

  .file-drop label{ cursor:pointer; color:var(--accent); font-weight:600; }

  .import-meta{ font-size:12px; color:var(--text-muted); margin-top:14px; }

  .sync-pill .dot{ width:7px; height:7px; border-radius:50%; background:var(--text-muted); flex:none; }
  .sync-pill.on .dot{ background:var(--ok); }
  .sync-pill.off .dot{ background:var(--danger); }
  .sync-pill.syncing .dot{ background:var(--warn); }
  .modal-overlay{

  .modal-card{
    background:var(--surface); border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow);

  .modal-card p{ font-size:13px; color:var(--text-muted); margin:0 0 12px; line-height:1.5; }

  .modal-card label{ font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); font-weight:600; display:block; margin:12px 0 4px; }

  .modal-card .row{ display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; align-items:center; }
  .modal-card .close-x{
    position:absolute; top:14px; right:14px; background:none; border:none; color:var(--text-muted);

  }
  .room-code{
    font-family:var(--font-mono); font-size:14px; font-weight:700; background:var(--surface-alt);
    padding:7px 10px; border-radius:7px; display:inline-block; letter-spacing:.02em; word-break:break-all;
  }
  @media print{ .modal-overlay{ display:none !important; } }

  /* ---------- Print / PDF report ---------- */
  #printArea{ display:none; }
  @media print{
    .app{ display:none !important; }
    #printArea{ display:block !important; }
    @page{ size:A4; margin:16mm 14mm; }
  }
  .rpt{ font-family:var(--font-body); color:#111; background:#fff; }
  .rpt h1{ font-family:var(--font-display); font-size:19px; margin:0 0 4px; letter-spacing:.2px; }
  .rpt .rpt-sub{ font-size:11px; color:#444; margin:0 0 2px; }
  .rpt .rpt-summary{ font-size:11px; color:#111; margin:10px 0 18px; padding:8px 10px; border:1px solid #999; border-radius:4px; }
  .rpt .rpt-summary b{ font-variant-numeric:tabular-nums; }
  .rpt section{ margin-bottom:20px; }
  .rpt h2{
    font-family:var(--font-display); font-size:12.5px; text-transform:uppercase; letter-spacing:.08em;
    margin:0 0 6px; padding-bottom:3px; border-bottom:1.5px solid #111;
  }
  .rpt table{ width:100%; border-collapse:collapse; font-size:10.5px; }
  .rpt thead{ display:table-header-group; }
  .rpt th{
    text-align:left; font-size:9.5px; text-transform:uppercase; letter-spacing:.04em; color:#333;
    border-bottom:1px solid #111; padding:4px 6px;
  }
  .rpt td{ padding:3.5px 6px; border-bottom:1px solid #ccc; }
  .rpt td.num, .rpt th.num{ text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .rpt td.code{ font-family:var(--font-mono); white-space:nowrap; color:#333; }
  .rpt tr{ break-inside:avoid; }
  .rpt .rpt-empty{ font-size:11px; color:#666; font-style:italic; }
</style>

</div>

  // ---------- helpers ----------
  function normalize(s){
    return (s===undefined||s===null?"":String(s)).normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase().trim();
  }
  function parseBRNumber(s){
    if(typeof s === "number") return s;
    s = (s===undefined||s===null?"0":String(s)).trim();
    if(s==="") return 0;
    s = s.replace(/\.(?=\d{3}(\D|$))/g,"").replace(",", ".");
    var n = parseFloat(s);
    return isNaN(n) ? 0 : n;
  }
  function fmt(n){
    var v = Math.round(n*100)/100;
    return (v % 1 === 0) ? String(v) : v.toFixed(2).replace(".", ",");
  }
  function el(tag, attrs, children){
    var e = document.createElement(tag);
    attrs = attrs || {};
    Object.keys(attrs).forEach(function(k){
      if(k==="html"){ e.innerHTML = attrs[k]; }
      else if(k.indexOf("on")===0){ e.addEventListener(k.slice(2), attrs[k]); }
      else if(k==="class"){ e.className = attrs[k]; }
      else { e.setAttribute(k, attrs[k]); }
    });
    (children||[]).forEach(function(c){ if(c!=null) e.appendChild(typeof c==="string" ? document.createTextNode(c) : c); });
    return e;
  }

  function save(){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
  }
  function load(){
    try{
      var raw = localStorage.getItem(STORE_KEY);
      if(raw){ var parsed = JSON.parse(raw); if(parsed && Array.isArray(parsed.items)){ state = parsed; return true; } }
    }catch(e){}
    return false;
  }

  function itemsFromRows(rows){
    return rows.map(function(r){
      return { codigo:String(r.codigo).trim(), un:(r.un||"UN").trim()||"UN", produto:r.produto.trim(), esperado:parseBRNumber(r.qtd), recebido:0, updatedAt:0 };
    }).filter(function(it){ return it.codigo || it.produto; });
  }

  function loadSeed(){
    state = {
      items: SEED_DATA.map(function(r){ return { codigo:r[0], un:r[1], produto:r[2], esperado:r[3], recebido:0, updatedAt:0 }; }),
      extras: [],
      importedAt: new Date().toISOString(),
      sourceLabel: "Dados de exemplo (amostra do PDF enviado — " + SEED_DATA.length + " itens)"
    };
    save();
    scheduleSync();
  }

  // ---------- import parsing ----------
  function parseImportText(text){
    var lines = text.split(/\r\n|\n|\r/).filter(function(l){ return l.trim().length; });
    if(!lines.length) return [];
    var first = lines[0];
    var delim = "\t";
    if(first.split("\t").length < 2){
      if(first.split(";").length >= 2) delim = ";";
      else if(first.split(",").length >= 2) delim = ",";
    }
    var rows = lines.map(function(l){ return l.split(delim); });
    var headerNorm = rows[0].map(normalize);
    var map = { codigo:-1, un:-1, produto:-1, qtd:-1 };
    headerNorm.forEach(function(h,i){
      if(/^cod/.test(h)) map.codigo = i;
      else if(/^un\.?$|unidade/.test(h)) map.un = i;
      else if(/produto|descri/.test(h)) map.produto = i;
      else if(/total|qtd|quantidade|esperad|recebid/.test(h)) map.qtd = i;
    });
    var hasHeader = map.codigo>=0 || map.produto>=0 || map.qtd>=0;
    var dataRows = hasHeader ? rows.slice(1) : rows.slice(0);
    if(!hasHeader){
      var cols = rows[0].length;
      if(cols>=4){ map.codigo=cols-4; map.un=cols-3; map.produto=cols-2; map.qtd=cols-1; }
      else if(cols===3){ map.codigo=0; map.produto=1; map.qtd=2; map.un=-1; }
      else { map.codigo=0; map.produto=0; map.qtd=1; }
    }
    var out = [];
    dataRows.forEach(function(cols){
      if(!cols || cols.length<1) return;
      var codigo = (map.codigo>=0 ? (cols[map.codigo]||"") : "").trim();
      var un = (map.un>=0 ? (cols[map.un]||"") : "").trim() || "UN";
      var produto = (map.produto>=0 ? (cols[map.produto]||"") : "").trim();
      var qtd = (map.qtd>=0 ? (cols[map.qtd]||"0") : "0").trim();
      if(!codigo && !produto) return;
      out.push({ codigo:codigo, un:un, produto:produto, qtd:qtd });
    });
    return out;
  }

  // ---------- shared room sync (GitHub Gist as backend) ----------
  var GIST_TOKEN_KEY = "wh_gist_token";
  var GIST_ID_KEY = "wh_gist_id";
  var GIST_FILE = "conferencia-estado.json";
  var SYNC_POLL_MS = 8000;
  var syncStatus = { syncing:false, lastSyncAt:null, error:null };
  var pushTimer = null;
  var pollTimer = null;

  function getGistToken(){ return localStorage.getItem(GIST_TOKEN_KEY) || ""; }
  function getGistId(){ return localStorage.getItem(GIST_ID_KEY) || ""; }
  function isConnected(){ return !!(getGistToken() && getGistId()); }
  function makeId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function ghHeaders(){
    return { "Authorization":"token " + getGistToken(), "Accept":"application/vnd.github+json", "Content-Type":"application/json" };
  }

  function mergeState(local, remote){
    if(!remote || !remote.items) return local;
    if(!local || !local.items || !local.items.length) return remote;
    var localImp = local.importedAt ? (Date.parse(local.importedAt)||0) : 0;
    var remoteImp = remote.importedAt ? (Date.parse(remote.importedAt)||0) : 0;
    var base = remoteImp >= localImp ? remote : local;
    var other = base === remote ? local : remote;
    var byCode = {};
    base.items.forEach(function(it){ byCode[it.codigo] = it; });
    (other.items||[]).forEach(function(it){
      var b = byCode[it.codigo];
      if(b && (it.updatedAt||0) > (b.updatedAt||0)){ b.recebido = it.recebido; b.updatedAt = it.updatedAt; }
    });
    var extrasByKey = {};
    (base.extras||[]).forEach(function(ex){ extrasByKey[ex.id || (ex.codigo+"|"+ex.produto)] = ex; });
    (other.extras||[]).forEach(function(ex){
      var key = ex.id || (ex.codigo+"|"+ex.produto);
      var e = extrasByKey[key];
      if(!e){ extrasByKey[key] = ex; }
      else if((ex.updatedAt||0) > (e.updatedAt||0)){ e.recebido = ex.recebido; e.updatedAt = ex.updatedAt; }
    });
    base.extras = Object.keys(extrasByKey).map(function(k){ return extrasByKey[k]; });
    return base;
  }

  function setSyncStatus(patch){
    for(var k in patch){ if(Object.prototype.hasOwnProperty.call(patch,k)) syncStatus[k] = patch[k]; }
    renderSyncBadge();
  }

  function pushState(){
    if(!isConnected()) return;
    setSyncStatus({ syncing:true, error:null });
    var body = { files:{} };
    body.files[GIST_FILE] = { content: JSON.stringify(state) };
    fetch("https://api.github.com/gists/" + getGistId(), { method:"PATCH", headers:ghHeaders(), body:JSON.stringify(body) })
      .then(function(res){ if(!res.ok) throw new Error("HTTP " + res.status); setSyncStatus({ syncing:false, lastSyncAt:new Date(), error:null }); })
      .catch(function(err){ setSyncStatus({ syncing:false, error:"Falha ao enviar para a sala: " + err.message }); });
  }

  function scheduleSync(){
    if(!isConnected()) return;
    if(pushTimer) clearTimeout(pushTimer);
    pushTimer = setTimeout(pushState, 900);
  }

  function pullState(silent){
    if(!isConnected()) return Promise.resolve();
    if(!silent) setSyncStatus({ syncing:true });
    return fetch("https://api.github.com/gists/" + getGistId(), { headers:ghHeaders() })
      .then(function(res){ if(!res.ok) throw new Error("HTTP " + res.status); return res.json(); })
      .then(function(gist){
        var file = gist.files && gist.files[GIST_FILE];
        if(!file || !file.content) return;
        var remote = JSON.parse(file.content);
        var before = JSON.stringify(state);
        state = mergeState(state, remote);
        var after = JSON.stringify(state);
        save();
        setSyncStatus({ syncing:false, lastSyncAt:new Date(), error:null });
        if(before !== after){
          var scanEl = document.getElementById("scanInput");
          var busy = (scanEl && scanEl.value.trim()) || document.querySelector(".confirm") || document.querySelector(".not-found");
          if(!busy) renderAll();
        }
      })
      .catch(function(err){ setSyncStatus({ syncing:false, error:"Falha ao sincronizar: " + err.message }); });
  }

  function startSyncLoop(){
    if(pollTimer) clearInterval(pollTimer);
    if(!isConnected()) return;
    pullState(true);
    pollTimer = setInterval(function(){ pullState(true); }, SYNC_POLL_MS);
  }

  document.addEventListener("visibilitychange", function(){
    if(!document.hidden && isConnected()) pullState(true);
  });

  function renderSyncBadge(){
    var b = document.getElementById("syncBadge");
    if(!b) return;
    var connected = isConnected();
    var cls = !connected ? "off" : (syncStatus.syncing ? "syncing" : (syncStatus.error ? "off" : "on"));
    var label = !connected ? "Somente local (sem sala conectada)"
      : (syncStatus.syncing ? "Sincronizando…"
      : (syncStatus.error ? syncStatus.error
      : "Sincronizado com a sala" + (syncStatus.lastSyncAt ? " · " + syncStatus.lastSyncAt.toLocaleTimeString("pt-BR") : "")));
    b.innerHTML = "";
    b.appendChild(el("button",{class:"sync-pill "+cls, onclick:openRoomModal},[el("span",{class:"dot"}), label]));
  }

  function closeRoomModal(){
    var overlay = document.getElementById("roomModalOverlay");
    if(overlay) overlay.remove();
  }

  function createRoom(){
    var token = document.getElementById("roomToken").value.trim();
    if(!token){ alert("Cole um token de acesso do GitHub (com o escopo gist) antes de continuar."); return; }
    localStorage.setItem(GIST_TOKEN_KEY, token);
    setSyncStatus({ syncing:true, error:null });
    var files = {}; files[GIST_FILE] = { content: JSON.stringify(state) };
    fetch("https://api.github.com/gists", {
      method:"POST",
      headers:{ "Authorization":"token "+token, "Accept":"application/vnd.github+json", "Content-Type":"application/json" },
      body: JSON.stringify({ description:"Conferência de Transferência — sala compartilhada", public:false, files:files })
    }).then(function(res){ if(!res.ok) throw new Error("HTTP " + res.status); return res.json(); })
      .then(function(gist){
        localStorage.setItem(GIST_ID_KEY, gist.id);
        setSyncStatus({ syncing:false, lastSyncAt:new Date(), error:null });
        startSyncLoop();
        renderAll();
        closeRoomModal(); openRoomModal();
      }).catch(function(err){
        setSyncStatus({ syncing:false, error:null });
        alert("Não consegui criar a sala. Confira se o token tem o escopo 'gist' e tente novamente.\n\n" + err.message);
      });
  }

  function connectRoom(){
    var token = document.getElementById("roomToken").value.trim();
    var id = document.getElementById("roomId").value.trim();
    if(!token || !id){ alert("Informe o token de acesso e o código da sala."); return; }
    localStorage.setItem(GIST_TOKEN_KEY, token);
    localStorage.setItem(GIST_ID_KEY, id);
    pullState(false).then(function(){
      startSyncLoop();
      renderAll();
      closeRoomModal(); openRoomModal();
    });
  }

  function disconnectRoom(){
    if(!confirm("Desconectar desta sala? A conferência deste computador passa a ficar só local, sem sincronizar com os outros.")) return;
    localStorage.removeItem(GIST_TOKEN_KEY);
    localStorage.removeItem(GIST_ID_KEY);
    if(pollTimer) clearInterval(pollTimer);
    setSyncStatus({ lastSyncAt:null, error:null });
    closeRoomModal();
    renderAll();
  }

  function openRoomModal(){
    closeRoomModal();
    var overlay = el("div",{class:"modal-overlay", id:"roomModalOverlay", onclick:function(e){ if(e.target.id==="roomModalOverlay") closeRoomModal(); }});
    var card = el("div",{class:"modal-card"});

    card.appendChild(el("h3",{},["Sala compartilhada"]));
    if(isConnected()){
      card.appendChild(el("p",{},["Este computador está sincronizando com a sala abaixo. Compartilhe o código com os outros computadores (cada um precisa do seu próprio token de acesso) para todos conferirem juntos, ao vivo."]));
      card.appendChild(el("div",{},[el("span",{class:"room-code"},[getGistId()])]));
      card.appendChild(el("div",{class:"row"},[
        el("button",{class:"btn btn-sm",onclick:function(){ if(navigator.clipboard){ navigator.clipboard.writeText(getGistId()); } }},["Copiar código"]),
        el("button",{class:"btn btn-sm",onclick:function(){ pullState(false); }},["Sincronizar agora"]),

      ]));
    } else {
      card.appendChild(el("p",{},[

        el("code",{},["gist"]), " (crie em github.com → Settings → Developer settings → Personal access tokens → Generate new token, marcando só a caixa 'gist')."
      ]));
      card.appendChild(el("label",{},["Token de acesso (GitHub, escopo gist)"]));
      card.appendChild(el("input",{type:"password", id:"roomToken", placeholder:"ghp_..."}));
      card.appendChild(el("label",{},["Código da sala — deixe em branco para criar uma sala nova"]));
      card.appendChild(el("input",{type:"text", id:"roomId", placeholder:"cole aqui o código recebido de outro computador"}));
      card.appendChild(el("div",{class:"row"},[
        el("button",{class:"btn btn-primary btn-sm",onclick:function(){
          var id = document.getElementById("roomId").value.trim();
          if(id) connectRoom(); else createRoom();
        }},["Conectar / criar sala"])
      ]));
    }
    if(syncStatus.error){ card.appendChild(el("p",{style:"color:var(--danger);"},[syncStatus.error])); }
    overlay.appendChild(card);
    document.body.appendChild(overlay);
  }

  // ---------- app state ----------
  var ui = {
    filter: "todos",
    tableSearch: "",
    matchedItem: null,
    matchedIsExtra: false,
    lastQuery: ""
  };

  function statusOf(it){
    if(it.recebido<=0) return "faltante";
    if(it.recebido===it.esperado) return "correto";
    return "divergente";
  }
  function statusLabel(s){
    return { correto:"Correto", divergente:"Divergência", faltante:"Faltante", extra:"Não previsto" }[s] || s;
  }

  function counts(){
    var c = { total: state.items.length, conferidos:0, correto:0, divergente:0, faltante:0, extra: state.extras.length };
    state.items.forEach(function(it){
      var s = statusOf(it);
      c[s]++;
      if(it.recebido>0) c.conferidos++;
    });
    return c;
  }

  // ---------- rendering ----------
  var mainEl = document.getElementById("main");

  // ---------- conference screen ----------
  function renderConferenceScreen(){
    var c = counts();
    subtitle.textContent = state.sourceLabel + (state.importedAt ? " · carregada em " + new Date(state.importedAt).toLocaleString("pt-BR") : "");
    mainEl.innerHTML = "";

    // stats
    var stats = el("div",{class:"stats"});
    var statDefs = [
      {key:"todos", label:"Itens na lista", value:c.total, tone:""},
      {key:"conferidos", label:"Conferidos", value:c.conferidos+"/"+c.total, tone:""},
      {key:"correto", label:"Corretos", value:c.correto, tone:"tone-ok"},
      {key:"divergente", label:"Divergências", value:c.divergente, tone:"tone-warn"},
      {key:"faltante", label:"Faltantes", value:c.faltante, tone:"tone-danger"},
      {key:"extra", label:"Não previstos", value:c.extra, tone:"tone-extra"}
    ];
    statDefs.forEach(function(d){
      var s = el("div",{class:"stat "+d.tone+(ui.filter===d.key?" active":""),onclick:function(){ ui.filter=d.key; renderConferenceScreen(); }},[
        el("div",{class:"n"},[String(d.value)]),
        el("div",{class:"l"},[d.label])
      ]);
      stats.appendChild(s);
    });
    mainEl.appendChild(stats);

    // scan dock
    var dock = el("div",{class:"dock"});
    dock.appendChild(el("label",{for:"scanInput"},["Buscar / bipar produto para conferir"]));
    var scanRow = el("div",{class:"scan-row"});
    var scanInput = el("input",{type:"text", id:"scanInput", autocomplete:"off", placeholder:"Digite o código ou nome do produto e pressione Enter…"});
    scanRow.appendChild(scanInput);
    dock.appendChild(scanRow);
    var suggestionsBox = el("div",{class:"suggestions"});
    dock.appendChild(suggestionsBox);
    var dynamicArea = el("div",{});
    dock.appendChild(dynamicArea);
    mainEl.appendChild(dock);

    function clearDynamic(){ dynamicArea.innerHTML = ""; ui.matchedItem=null; ui.matchedIsExtra=false; }

    function showConfirm(item){
      clearDynamic();
      ui.matchedItem = item; ui.matchedIsExtra = false;
      var box = el("div",{class:"confirm"});
      var jaConferido = item.recebido>0 ? (" · já registrado: " + fmt(item.recebido)) : "";
      box.appendChild(el("div",{class:"info"},[
        el("div",{class:"code"},[item.codigo + " · " + item.un]),
        el("div",{class:"name"},[item.produto]),
        el("div",{class:"meta"},["Esperado: " + fmt(item.esperado) + jaConferido])
      ]));
      var qtyBlock = el("div",{class:"qty-block"});
      qtyBlock.appendChild(el("label",{},["Quantidade recebida agora"]));
      var qtyInput = el("input",{type:"text", inputmode:"decimal", value:"1"});
      qtyBlock.appendChild(qtyInput);
      box.appendChild(qtyBlock);
      var btns = el("div",{class:"btns"});
      btns.appendChild(el("button",{class:"btn btn-primary btn-sm",onclick:function(){
        var q = parseBRNumber(qtyInput.value);
        if(q<=0) return;
        item.recebido += q;
        item.updatedAt = Date.now();
        save(); scheduleSync();
        scanInput.value=""; suggestionsBox.innerHTML=""; clearDynamic();
        renderConferenceScreen();
        document.getElementById("scanInput") && document.getElementById("scanInput").focus();
      }},["Registrar"]));
      btns.appendChild(el("button",{class:"btn btn-ghost btn-sm",onclick:function(){ clearDynamic(); scanInput.value=""; suggestionsBox.innerHTML=""; scanInput.focus(); }},["Cancelar"]));
      box.appendChild(btns);
      dynamicArea.appendChild(box);
      setTimeout(function(){ qtyInput.focus(); qtyInput.select(); }, 0);
      qtyInput.addEventListener("keydown", function(e){
        if(e.key==="Enter"){ e.preventDefault(); box.querySelector(".btn-primary").click(); }
        if(e.key==="Escape"){ e.preventDefault(); box.querySelector(".btn-ghost").click(); }
      });
    }

    function showNotFound(query){
      clearDynamic();
      var box = el("div",{class:"not-found"});
      box.appendChild(el("div",{class:"headline"},["Nenhum item da lista corresponde a “" + query + "”."]));
      var rowEl = el("div",{class:"row"});
      var codeField = el("div",{class:"field"},[el("label",{},["Código"]), (function(){ var i=el("input",{type:"text",value:query}); return i; })()]);
      var nameField = el("div",{class:"field"},[el("label",{},["Descrição (opcional)"]), el("input",{type:"text",placeholder:"O que chegou fisicamente?"})]);
      var qtyField = el("div",{class:"field qty"},[el("label",{},["Qtd."]), el("input",{type:"text",inputmode:"decimal",value:"1"})]);
      rowEl.appendChild(codeField); rowEl.appendChild(nameField); rowEl.appendChild(qtyField);
      box.appendChild(rowEl);
      var btns = el("div",{style:"margin-top:10px;display:flex;gap:8px;"});
      var registerBtn = el("button",{class:"btn btn-sm",style:"border-color:var(--danger);color:var(--danger);",onclick:function(){
        var codigo = codeField.querySelector("input").value.trim() || query;
        var produto = nameField.querySelector("input").value.trim() || "(sem descrição informada)";
        var q = parseBRNumber(qtyField.querySelector("input").value);
        if(q<=0) return;
        var existing = state.extras.find(function(ex){ return ex.codigo===codigo; });
        var t = Date.now();
        if(existing){ existing.recebido += q; existing.updatedAt = t; }
        else { state.extras.push({id:makeId(), codigo:codigo, produto:produto, un:"UN", recebido:q, updatedAt:t}); }
        save(); scheduleSync();
        scanInput.value=""; suggestionsBox.innerHTML=""; clearDynamic();
        renderConferenceScreen();
        document.getElementById("scanInput") && document.getElementById("scanInput").focus();
      }},["Registrar mesmo assim (item não previsto)"]);
      btns.appendChild(registerBtn);
      btns.appendChild(el("button",{class:"btn btn-ghost btn-sm",onclick:function(){ clearDynamic(); scanInput.value=""; suggestionsBox.innerHTML=""; scanInput.focus(); }},["Cancelar"]));
      box.appendChild(btns);
      box.appendChild(el("small",{},["Use isso para registrar produtos que chegaram fisicamente mas não estão na planilha da transferência."]));
      dynamicArea.appendChild(box);
    }

    function doSearch(q){
      var nq = normalize(q);
      suggestionsBox.innerHTML = "";
      if(!nq){ clearDynamic(); return; }
      var exact = state.items.find(function(it){ return normalize(it.codigo)===nq; });
      var list;
      if(exact){ list = [exact]; }
      else {
        list = state.items.filter(function(it){
          return normalize(it.codigo).indexOf(nq)===0 || normalize(it.produto).indexOf(nq)>=0;
        }).slice(0,8);
      }
      if(!list.length){ return; }
      list.forEach(function(it){
        var s = statusOf(it);
        var row = el("button",{class:"sugg-item",type:"button",onclick:function(){ showConfirm(it); }},[
          el("span",{class:"code"},[it.codigo]),
          el("span",{class:"name"},[it.produto]),
          el("span",{class:"mini"},[fmt(it.recebido)+"/"+fmt(it.esperado)+" "+it.un]),
          (function(){ var p=el("span",{class:"pill "+(s==="correto"?"ok":s==="divergente"?"warn":"danger")},[statusLabel(s)]); return p; })()
        ]);
        suggestionsBox.appendChild(row);
      });
    }

    scanInput.addEventListener("input", function(){ ui.lastQuery = scanInput.value; doSearch(scanInput.value); });
    scanInput.addEventListener("keydown", function(e){
      if(e.key !== "Enter") return;
      e.preventDefault();
      var q = scanInput.value.trim();
      if(!q) return;
      var nq = normalize(q);
      var exact = state.items.find(function(it){ return normalize(it.codigo)===nq; });
      if(exact){ showConfirm(exact); return; }
      var narrowed = state.items.filter(function(it){
        return normalize(it.codigo).indexOf(nq)===0 || normalize(it.produto).indexOf(nq)>=0;
      });
      if(narrowed.length===1){ showConfirm(narrowed[0]); return; }
      if(narrowed.length>1){ return; } // let user click the right suggestion
      showNotFound(q);
    });
    setTimeout(function(){ scanInput.focus(); }, 0);

    // tabs
    var tabs = el("div",{class:"tabs"});
    var tabDefs = [
      {key:"todos", label:"Todos ("+c.total+")"},
      {key:"correto", label:"Corretos ("+c.correto+")"},
      {key:"divergente", label:"Divergências ("+c.divergente+")"},
      {key:"faltante", label:"Faltantes ("+c.faltante+")"},
      {key:"extra", label:"Não previstos ("+c.extra+")"}
    ];
    tabDefs.forEach(function(d){
      tabs.appendChild(el("button",{class:"tab"+(ui.filter===d.key?" active":""),onclick:function(){ ui.filter=d.key; renderConferenceScreen(); }},[d.label]));
    });
    var toolbar = el("div",{class:"table-toolbar"});
    toolbar.appendChild(tabs);
    var filterBox = el("div",{class:"table-filter"});
    var filterInput = el("input",{type:"text",placeholder:"Filtrar lista por código ou nome…",value:ui.tableSearch});
    filterInput.addEventListener("input", function(){ ui.tableSearch = filterInput.value; renderTable(); });
    filterBox.appendChild(filterInput);
    toolbar.appendChild(filterBox);
    mainEl.appendChild(toolbar);

    var tableWrap = el("div",{class:"table-wrap"});
    mainEl.appendChild(tableWrap);

    function renderTable(){
      tableWrap.innerHTML = "";
      var table = el("table");
      var thead = el("thead",{},[el("tr",{},[
        el("th",{},["Código"]), el("th",{},["Produto"]), el("th",{},["Un."]),
        el("th",{style:"text-align:right"},["Esperado"]), el("th",{style:"text-align:right"},["Recebido"]),
        el("th",{style:"text-align:right"},["Diferença"]), el("th",{},["Status"])
      ])]);
      table.appendChild(thead);
      var tbody = el("tbody");

      var nq = normalize(ui.tableSearch);
      var rowsToShow = [];
      state.items.forEach(function(it){
        var s = statusOf(it);
        if(ui.filter!=="todos" && ui.filter!=="extra" && ui.filter!==s) return;
        if(ui.filter==="extra") return;
        if(nq && normalize(it.codigo).indexOf(nq)<0 && normalize(it.produto).indexOf(nq)<0) return;
        rowsToShow.push({kind:"item", ref:it, status:s});
      });
      if(ui.filter==="todos" || ui.filter==="extra"){
        state.extras.forEach(function(ex){
          if(nq && normalize(ex.codigo).indexOf(nq)<0 && normalize(ex.produto).indexOf(nq)<0) return;
          rowsToShow.push({kind:"extra", ref:ex, status:"extra"});
        });
      }

      if(!rowsToShow.length){
        tbody.appendChild(el("tr",{class:"empty-row"},[el("td",{colspan:"7"},["Nenhum item nesta visão."])]));
      }

      rowsToShow.forEach(function(r){
        var tr = el("tr");
        if(r.kind==="item"){
          var it = r.ref;
          var diff = it.recebido - it.esperado;
          tr.appendChild(el("td",{class:"code"},[it.codigo]));
          tr.appendChild(el("td",{class:"produto",title:it.produto},[it.produto]));
          tr.appendChild(el("td",{},[it.un]));
          tr.appendChild(el("td",{class:"num"},[fmt(it.esperado)]));
          var recCell = el("td",{class:"num"});
          var recInput = el("input",{type:"text", inputmode:"decimal", value:fmt(it.recebido)});
          recInput.addEventListener("change", function(){
            it.recebido = parseBRNumber(recInput.value);
            it.updatedAt = Date.now();
            save(); scheduleSync(); renderConferenceScreen();
          });
          recCell.appendChild(recInput);
          tr.appendChild(recCell);
          tr.appendChild(el("td",{class:"num "+(diff>0?"diff-pos":diff<0?"diff-neg":"diff-zero")},[(diff>0?"+":"")+fmt(diff)]));
          var st = r.status;
          tr.appendChild(el("td",{},[el("span",{class:"pill "+(st==="correto"?"ok":st==="divergente"?"warn":"danger")},[statusLabel(st)])]));
        } else {
          var ex = r.ref;
          tr.appendChild(el("td",{class:"code"},[ex.codigo]));
          tr.appendChild(el("td",{class:"produto",title:ex.produto},[ex.produto]));
          tr.appendChild(el("td",{},[ex.un]));
          tr.appendChild(el("td",{class:"num"},["—"]));
          var recCell2 = el("td",{class:"num"});
          var recInput2 = el("input",{type:"text", inputmode:"decimal", value:fmt(ex.recebido)});
          recInput2.addEventListener("change", function(){ ex.recebido = parseBRNumber(recInput2.value); ex.updatedAt = Date.now(); save(); scheduleSync(); renderConferenceScreen(); });
          recCell2.appendChild(recInput2);
          tr.appendChild(recCell2);
          tr.appendChild(el("td",{class:"num diff-pos"},["+"+fmt(ex.recebido)]));
          tr.appendChild(el("td",{},[el("span",{class:"pill extra"},["Não previsto"])]));
        }
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      tableWrap.appendChild(table);
    }
    renderTable();
  }

  // ---------- export PDF (impressão no mesmo molde do relatório original) ----------
  function escapeHtml(s){
    return String(s===undefined||s===null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
  function ensurePrintArea(){
    var pa = document.getElementById("printArea");
    if(!pa){ pa = el("div",{id:"printArea"}); document.body.appendChild(pa); }
    return pa;
  }
  function sectionTable(title, rows, kind){
    var headCols = (kind==="extra")
      ? "<th>Código</th><th>Produto</th><th>Un.</th><th class=\"num\">Recebido</th>"
      : "<th>Código</th><th>Produto</th><th>Un.</th><th class=\"num\">Esperado</th><th class=\"num\">Recebido</th><th class=\"num\">Diferença</th>";
    var colspan = (kind==="extra") ? 4 : 6;
    var body = "";
    if(!rows.length){
      body = '<tr><td colspan="'+colspan+'" class="rpt-empty">Nenhum item nesta situação.</td></tr>';
    } else {
      rows.forEach(function(r){
        if(kind==="extra"){
          body += "<tr><td class=\"code\">"+escapeHtml(r.codigo)+"</td><td>"+escapeHtml(r.produto)+"</td><td>"+escapeHtml(r.un)+"</td>"+
            "<td class=\"num\">"+fmt(r.recebido)+"</td></tr>";
        } else {
          var diff = r.recebido - r.esperado;
          body += "<tr><td class=\"code\">"+escapeHtml(r.codigo)+"</td><td>"+escapeHtml(r.produto)+"</td><td>"+escapeHtml(r.un)+"</td>"+
            "<td class=\"num\">"+fmt(r.esperado)+"</td><td class=\"num\">"+fmt(r.recebido)+"</td>"+
            "<td class=\"num\">"+(diff>0?"+":"")+fmt(diff)+"</td></tr>";
        }
      });
    }
    return "<section><h2>"+escapeHtml(title)+"</h2><table><thead><tr>"+headCols+"</tr></thead><tbody>"+body+"</tbody></table></section>";
  }
  function exportPDF(){
    var c = counts();
    var divergentes = state.items.filter(function(it){ return statusOf(it)==="divergente"; });
    var faltantes   = state.items.filter(function(it){ return statusOf(it)==="faltante"; });
    var corretos    = state.items.filter(function(it){ return statusOf(it)==="correto"; });
    var extras = state.extras;

    var html = "<div class=\"rpt\">";
    html += "<h1>Relatório de Conferência de Transferência</h1>";
    html += "<div class=\"rpt-sub\">"+escapeHtml(state.sourceLabel||"")+"</div>";
    html += "<div class=\"rpt-sub\">Gerado em "+escapeHtml(new Date().toLocaleString("pt-BR"))+"</div>";
    html += "<div class=\"rpt-summary\">"+
      "Total na lista: <b>"+c.total+"</b> &nbsp;·&nbsp; Conferidos: <b>"+c.conferidos+"</b> &nbsp;·&nbsp; "+
      "Corretos: <b>"+c.correto+"</b> &nbsp;·&nbsp; Divergências: <b>"+c.divergente+"</b> &nbsp;·&nbsp; "+
      "Faltantes: <b>"+c.faltante+"</b> &nbsp;·&nbsp; Não previstos: <b>"+c.extra+"</b>"+
      "</div>";

    html += sectionTable("Divergências ("+divergentes.length+")", divergentes, "item");
    html += sectionTable("Faltantes ("+faltantes.length+")", faltantes, "item");
    html += sectionTable("Não previstos na lista ("+extras.length+")", extras, "extra");
    html += sectionTable("Itens corretos ("+corretos.length+")", corretos, "item");
    html += "</div>";

    var pa = ensurePrintArea();
    pa.innerHTML = html;

    var oldTitle = document.title;
    document.title = "Relatorio-Conferencia-" + new Date().toISOString().slice(0,10);
    function restoreTitle(){ document.title = oldTitle; window.removeEventListener("afterprint", restoreTitle); }
    window.addEventListener("afterprint", restoreTitle);
    setTimeout(function(){ window.print(); }, 50);
  }

  // ---------- export CSV ----------
  function csvEscape(v){
    v = String(v===undefined||v===null?"":v);
    if(/[;"\n]/.test(v)) return '"' + v.replace(/"/g,'""') + '"';
    return v;
  }
  function exportCSV(){
    var rows = [["Código","Produto","Unidade","Qtd Esperada","Qtd Recebida","Diferença","Status"]];
    state.items.forEach(function(it){
      var s = statusOf(it);
      rows.push([it.codigo, it.produto, it.un, fmt(it.esperado), fmt(it.recebido), fmt(it.recebido-it.esperado), statusLabel(s)]);
    });
    state.extras.forEach(function(ex){
      rows.push([ex.codigo, ex.produto, ex.un, "", fmt(ex.recebido), fmt(ex.recebido), "Não previsto na lista"]);
    });
    var csv = rows.map(function(r){ return r.map(csvEscape).join(";"); }).join("\r\n");
    var blob = new Blob(["﻿"+csv], {type:"text/csv;charset=utf-8;"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "conferencia-transferencia-" + new Date().toISOString().slice(0,19).replace(/[:T]/g,"-") + ".csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ---------- init ----------
  load();
  renderAll();
  startSyncLoop();
})();
</script>
